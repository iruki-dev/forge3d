name: Bug Report
description: Report a reproducible bug in forge3d
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: forge3d version
      placeholder: "e.g. 0.4.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.3"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Paste the shortest code that triggers the bug.
      render: python
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Traceback / error output
      render: text
