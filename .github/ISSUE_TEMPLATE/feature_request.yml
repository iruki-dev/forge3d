name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this feature solve? What use-case does it enable?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API / behaviour
      description: Show code examples or describe the desired API.
      render: python

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds exist today?
