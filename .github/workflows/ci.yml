name: CI

on:
  push:
    branches: [main, "phase-*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps (Xvfb for headless GL)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb libgl1-mesa-dri libgles2

      - name: Install pyforge3d + dev deps
        run: pip install -e ".[dev]"

      - name: Run tests (headless)
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 1
          pytest tests/ \
            --ignore=tests/test_p9_training.py \
            --ignore=tests/test_pick_place.py \
            --ignore=tests/test_reach_env.py \
            --ignore=tests/test_p11_jax.py \
            -q --tb=short

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy src/

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Check package
        run: |
          pip install twine
          twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
